<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="ret69.ico">
  <title>RATZ.IO - ULTIMATE BATTLE ROYALE EDITION</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050505;
      font-family: 'Orbitron', sans-serif;
      color: white;
      user-select: none;
      image-rendering: pixelated;
    }

    #menu h1 {
      font-size: 80px;
      color: #00ffff;
      text-shadow: 4px 4px 0 #ff0080, -4px -4px 0 #000;
      margin: 10px;
      animation: hotlinePulse 0.5s infinite alternate, hotlineTilt 2s infinite ease-in-out, flicker 2s infinite;
    }

    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% { opacity:1 }
      20%,24%,55% { opacity:0.5 }
    }

    @keyframes hotlinePulse {
      from { transform:scale(1); filter:hue-rotate(0deg) }
      to   { transform:scale(1.05); filter:hue-rotate(30deg) }
    }

    @keyframes hotlineTilt {
      0%   { transform:rotate(-3deg) }
      50%  { transform:rotate(3deg)  }
      100% { transform:rotate(-3deg) }
    }

    #menu, #death, #win, #timeup {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(255,0,128,0.22) 0%, #000 90%);
      z-index: 10;
    }

    #death, #win, #timeup { display: none; }

    #leaderboard {
      position: absolute;
      top: 12px;
      right: 20px;
      width: 240px;
      background: rgba(0,0,0,0.82);
      padding: 14px;
      border: 2px solid #ff0080;
      box-shadow: 0 0 16px #ff0080;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      line-height: 1.5;
    }

    #powerInfo {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.65);
      padding: 16px 20px;
      border-left: 6px solid #00ffff;
      font-size: 13px;
    }

    .power {
      display: flex;
      align-items: center;
      margin: 14px 0;
      font-size: 11px;
    }

    .power img {
      width: 52px;
      margin-right: 16px;
      filter: drop-shadow(0 0 6px #00ffff);
    }

    input, button {
      padding: 16px 24px;
      margin: 12px;
      font-family: 'Press Start 2P', cursive;
      font-size: 13px;
      background: #111;
      color: #00ffff;
      border: 3px solid #ff0080;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover {
      background: #ff0080;
      color: white;
      box-shadow: 0 0 22px #ff0080;
      transform: scale(1.04);
    }

    #minimap {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 160px;
      height: 160px;
      background: rgba(0,0,0,0.85);
      border: 2px solid #00ffff;
      border-radius: 6px;
      box-shadow: 0 0 12px #00ffff33;
    }

    #menuBoard {
      margin-top: 24px;
      background: rgba(255,0,128,0.08);
      padding: 12px 20px;
      border: 1px solid #ff0080;
      border-radius: 4px;
    }

    .rank-row {
      color: #00ffff;
      margin: 8px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #timer {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      color: #ff0080;
      font-family: 'Press Start 2P', cursive;
      text-shadow: 0 0 12px #ff0080;
      z-index: 5;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>RATZ.IO</h1>
  <div id="powerInfo">
    <div class="power"><img src="meth.png" alt="speed"/> <span>SEEDS = 5s SPEED BOOST</span></div>
    <div class="power"><img src="pot.png" alt="triple"/> <span>BERRIES = 10s TRIPLE SCORE</span></div>
    <div class="power"><img src="piss.png" alt="poison"/> <span>POISON = 8s TOUCH OF DEATH</span></div>
    <div class="power"><img src="nih.png" alt="extra life"/> <span>NIH = +1 LIFE (max 6)</span></div>
    <div style="font-size:11px;color:#ff0080;text-align:center;margin-top:12px;">
      ESC = MENU • MOUSE WHEEL = ZOOM
    </div>
  </div>

  <input id="nameInput" placeholder="ENTER NAME" maxlength="27" autocomplete="off"/>
  
  <div id="skinSelector">
    <button onclick="prevSkin()">◀</button>
    <span id="skinName" style="padding:0 20px;font-family:'Press Start 2P';">Hertz</span>
    <button onclick="nextSkin()">▶</button>
  </div>

  <button onclick="start()">ENTER THE MAYHEM</button>

  <div id="menuBoard">
    <div style="font-family:'Press Start 2P';font-size:11px;color:#ff0080;margin-bottom:12px;">
      PRE-GAME TOP 5
    </div>
    <div id="topFiveMenu"></div>
  </div>
</div>

<div id="death">
  <h1>💀 YOU GOT ANNIHILATED 💀</h1>
  <button onclick="location.reload()">RETRY</button>
</div>

<div id="win">
  <h1>🔥 RAT SUPREMACY 🔥</h1>
  <button onclick="location.reload()">AGAIN</button>
</div>

<div id="timeup">
  <h1>⏰ TIME'S UP! ROUND OVER ⏰</h1>
  <button onclick="location.reload()">PLAY NEW ROUND</button>
</div>

<div id="leaderboard"></div>
<div id="timer">3:00</div>
<canvas id="minimap"></canvas>
<canvas id="c"></canvas>

<script>
// ────────────────────────────────────────────────
//  GAME VARIABLES & ASSETS
// ────────────────────────────────────────────────

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const mCanvas = document.getElementById("minimap");
const mCtx = mCanvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
mCanvas.width = 160;
mCanvas.height = 160;

const world = { w: 8000, h: 8000 };
let zoom = 1.0;
let started = false;
let shake = 0;

const cheeseImg    = new Image(); cheeseImg.src    = "chez1.png";
const heartImg     = new Image(); heartImg.src     = "helt.png";
const speedImg     = new Image(); speedImg.src     = "meth.png";
const tripleImg    = new Image(); tripleImg.src    = "pot.png";
const poisonImg    = new Image(); poisonImg.src    = "piss.png";
const extralifeImg = new Image(); extralifeImg.src = "nih.png";

const ratSkins = [
  { img: new Image(), name: "Hertz"    },
  { img: new Image(), name: "Bob"      },
  { img: new Image(), name: "Gustav"   },
  { img: new Image(), name: "Daniels"  },
  { img: new Image(), name: "Robert"   },
  { img: new Image(), name: "Gobligoo" },
  { img: new Image(), name: "Freakwave"},
  { img: new Image(), name: "Blimpy"   }
];

ratSkins[0].img.src = "ret1.png";
ratSkins[1].img.src = "ret2.png";
ratSkins[2].img.src = "ret3.png";
ratSkins[3].img.src = "ret4.png";
ratSkins[4].img.src = "ret5.png";
ratSkins[5].img.src = "ret6.png";
ratSkins[6].img.src = "ret7.png";
ratSkins[7].img.src = "ret8.png";

let selectedSkin = 0;

function updateSkinUI() {
  document.getElementById("skinName").innerText = ratSkins[selectedSkin].name;
}

function nextSkin() {
  selectedSkin = (selectedSkin + 1) % ratSkins.length;
  updateSkinUI();
}

function prevSkin() {
  selectedSkin = (selectedSkin - 1 + ratSkins.length) % ratSkins.length;
  updateSkinUI();
}

const music = new Audio("Neon Bloodbath.mp3");
music.loop = true;
music.volume = 0.3;

function playPickupSound() {
  const snd = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");
  snd.volume = 0.4 + Math.random() * 0.3;
  snd.play().catch(() => {});
}

let cheese = [];
let powerups = [];
let bots = [];
let particles = [];
let floatingTexts = [];

let gameStartTime = 0;
const GAME_DURATION = 180;
const MAX_HEARTS = 6;

let player = {
  id: "player",
  x: world.w / 2,
  y: world.h / 2,
  size: 45,
  score: 0,
  hearts: 2,
  name: "RAT",
  speedBoost: 0,
  triple: 0,
  poison: 0,
  speedMul: 1,
  skin: ratSkins[0],
  level: 1,
  invuln: 0,
  flash: 0
};

let mouse = { x: 0, y: 0 };
let boosting = false;

window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => boosting = true;
window.onmouseup   = () => boosting = false;
window.onwheel = e => {
  if (e.deltaY > 0) zoom = Math.max(0.3, zoom - 0.05);
  else              zoom = Math.min(1.8, zoom + 0.05);
};
window.onkeydown = e => { if (e.key === "Escape") location.reload(); };
window.onresize = () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
};

function getDist(o1, o2) {
  return Math.hypot(o1.x - o2.x, o1.y - o2.y);
}

function spawnCheese(x, y, value = 30) {
  cheese.push({
    x: x ?? Math.random() * world.w,
    y: y ?? Math.random() * world.h,
    size: 15,
    value
  });
}

function spawnBot() {
  const botNames = [
    "Ben Dover", "Phil McCracken", "Anita Bath", "Hugh Jass", "Al Beback",
    "Seymour Butts", "Drew Peacock", "Lou Natic", "Ivana Tinkle",
    "Oliver Klozoff", "Barry McCockiner", "Holden McGroin", "Willie Stroker"
  ];

  bots.push({
    id: "bot_" + Math.random().toString(36).slice(2),
    x: Math.random() * world.w,
    y: Math.random() * world.h,
    tx: Math.random() * world.w,
    ty: Math.random() * world.h,
    size: 35 + Math.random() * 25,
    speed: 2.2 + Math.random() * 0.8,
    score: 200 + Math.random() * 300,
    hearts: 2,
    name: botNames[Math.floor(Math.random() * botNames.length)],
    skin: ratSkins[Math.floor(Math.random() * ratSkins.length)],
    invuln: 0,
    flash: 0,
    speedBoost: 0,
    triple: 0,
    poison: 0,
    state: "WANDER"
  });
}

function dropLoot(target) {
  const dropAmount = Math.floor(target.score * 0.5);
  const chunks = 12;
  const valPer = Math.max(10, dropAmount / chunks);

  for (let i = 0; i < chunks; i++) {
    spawnCheese(
      target.x + (Math.random() - 0.5) * 200,
      target.y + (Math.random() - 0.5) * 200,
      valPer
    );
  }
  fx(target.x, target.y, "#ff0080", 15);
}

function fx(x, y, color, count = 5) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      dx: (Math.random() - 0.5) * 8,
      dy: (Math.random() - 0.5) * 8,
      life: 20 + Math.random() * 20,
      color
    });
  }
}

function start() {
  player.name = document.getElementById("nameInput").value.trim() || "RAT";
  player.skin = ratSkins[selectedSkin];

  // Cheat codes
  const lowerName = player.name.toLowerCase();
  if (lowerName === "forksinthesockets") player.speedMul = 2.0;
  if (lowerName === "ihave200rats")       player.hearts = 5;
  if (lowerName === "kanyewestisthebest") {
    player.score = 5000;
    player.size = 80;
  }

  document.getElementById("menu").style.display = "none";
  started = true;
  gameStartTime = Date.now() / 1000;

  // Starting power-ups near spawn
  for (let i = 0; i < 3; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 300 + Math.random() * 400;
    powerups.push({
      x: player.x + Math.cos(angle) * dist,
      y: player.y + Math.sin(angle) * dist,
      type: ["speed","triple","poison","extralife"][Math.floor(Math.random()*4)]
    });
  }

  for (let i = 0; i < 35; i++) spawnBot();

  music.play().catch(() => {});
  loop();
}

function updateAI(bot) {
  if (bot.hearts <= 0) return;

  if (bot.invuln > 0) bot.invuln--;
  if (bot.flash > 0) bot.flash--;
  if (bot.speedBoost > 0) bot.speedBoost--;
  if (bot.triple > 0) bot.triple--;
  if (bot.poison > 0) bot.poison--;

  let nearestThreat = null;
  let nearestPrey = null;
  let threatDist = 500;
  let preyDist = 600;
  let potentialTargets = [player, ...bots.filter(b => b.id !== bot.id)];

  potentialTargets.forEach(t => {
    const d = getDist(bot, t);
    if (t.size > bot.size * 1.15 && d < threatDist) {
      nearestThreat = t;
      threatDist = d;
    } else if (t.size < bot.size * 0.85 && d < preyDist) {
      nearestPrey = t;
      preyDist = d;
    }
  });

  let closestPower = null;
  let pDist = 700;
  powerups.forEach(pu => {
    const d = getDist(bot, pu);
    if (d < pDist) {
      pDist = d;
      closestPower = pu;
    }
  });

  if (closestPower && pDist < 700) {
    bot.tx = closestPower.x;
    bot.ty = closestPower.y;
    bot.state = "POWERHUNT";
  } else if (nearestThreat) {
    bot.state = "FLEE";
    const angle = Math.atan2(bot.y - nearestThreat.y, bot.x - nearestThreat.x);
    bot.tx = bot.x + Math.cos(angle) * 400;
    bot.ty = bot.y + Math.sin(angle) * 400;
  } else if (nearestPrey) {
    bot.state = "HUNT";
    bot.tx = nearestPrey.x;
    bot.ty = nearestPrey.y;
  } else {
    bot.state = "EAT";
    let closestC = null;
    let cDist = 800;
    cheese.slice(0, 50).forEach(c => {
      const d = getDist(bot, c);
      if (d < cDist) {
        cDist = d;
        closestC = c;
      }
    });
    if (closestC) {
      bot.tx = closestC.x;
      bot.ty = closestC.y;
    } else if (getDist(bot, { x: bot.tx, y: bot.ty }) < 50) {
      bot.tx = Math.random() * world.w;
      bot.ty = Math.random() * world.h;
    }
  }

  const angle = Math.atan2(bot.ty - bot.y, bot.tx - bot.x);
  let spd = bot.speed * (bot.state === "FLEE" ? 1.6 : 1);
  if (bot.speedBoost > 0) spd *= 1.8;

  bot.x += Math.cos(angle) * spd;
  bot.y += Math.sin(angle) * spd;

  bot.x = Math.max(50, Math.min(world.w - 50, bot.x));
  bot.y = Math.max(50, Math.min(world.h - 50, bot.y));
}

function handleCombat(r1, r2) {
  if (r1.invuln > 0 || r2.invuln > 0) return;
  if (r1.hearts <= 0 || r2.hearts <= 0) return;

  const dist = getDist(r1, r2);
  if (dist >= r1.size + r2.size) return;

  // Determine attacker (bigger) and victim (smaller)
  let attacker = r1.size > r2.size ? r1 : r2;
  let victim   = r1.size > r2.size ? r2 : r1;

  // ─── PLAYER POISON PROTECTION & OFFENSE ────────────────────────────────
  if (attacker.id === "player" && attacker.poison > 0) {
    // Player with poison insta-kills victim
    victim.hearts = 0;
    fx(victim.x, victim.y, "#88ff00", 30);
    floatingTexts.push({ x: victim.x, y: victim.y, text: "POISONED!", color: "#88ff00", life: 60 });
  } else if (victim.id === "player" && victim.poison > 0) {
    // Player has poison → attacker dies instead (touch of death)
    attacker.hearts = 0;
    fx(attacker.x, attacker.y, "#88ff00", 30);
    floatingTexts.push({ x: attacker.x, y: attacker.y, text: "POISONED!", color: "#88ff00", life: 60 });
    // Swap so player gets the kill credit
    [attacker, victim] = [victim, attacker];
  } else if (attacker.poison > 0) {
    // Normal case: bigger bot has poison → insta-kill smaller
    victim.hearts = 0;
    fx(victim.x, victim.y, "#88ff00", 30);
    floatingTexts.push({ x: victim.x, y: victim.y, text: "POISONED!", color: "#88ff00", life: 60 });
  } else {
    // Normal damage
    victim.hearts--;
    victim.invuln = 60;
    victim.flash = 10;
  }
  // ────────────────────────────────────────────────────────────────

  shake = 8;

  const angle = Math.atan2(victim.y - attacker.y, victim.x - attacker.x);
  victim.x += Math.cos(angle) * 200;
  victim.y += Math.sin(angle) * 200;

  if (victim.hearts <= 0) {
    attacker.score += 500;
    attacker.size += 6;
    dropLoot(victim);

    if (attacker.id === "player") {
      floatingTexts.push({
        x: attacker.x,
        y: attacker.y,
        text: "RAT DEFEATED +500",
        color: "#00ffff",
        life: 50
      });
    }

    if (victim.id === "player") {
      document.getElementById("death").style.display = "flex";
    } else {
      bots = bots.filter(b => b.id !== victim.id);
      spawnBot();
    }
  }
}

function loop() {
  if (!started) return;

  const now = Date.now() / 1000;
  const elapsed = now - gameStartTime;
  const remaining = Math.max(0, GAME_DURATION - elapsed);
  const min = Math.floor(remaining / 60);
  const sec = Math.floor(remaining % 60);
  document.getElementById("timer").innerText = `${min}:${sec.toString().padStart(2,'0')}`;

  if (remaining <= 0) {
    document.getElementById("timeup").style.display = "flex";
    started = false;
    return;
  }

  const playerAlive = player.hearts > 0;

  // ─── PLAYER LOGIC ONLY WHEN ALIVE ────────────────────────────────
  if (playerAlive) {
    if (player.speedBoost > 0) player.speedBoost--;
    if (player.triple > 0) player.triple--;
    if (player.poison > 0) player.poison--;
    if (player.invuln > 0) player.invuln--;
    if (player.flash > 0) player.flash--;

    let pSpeed = (boosting ? 6.0 : 3.2) * player.speedMul;
    if (player.speedBoost > 0) pSpeed += 3.5;

    if (boosting && player.score > 10) {
      const drainAmount = 0.5 + (player.level * 0.45);
      player.score = Math.max(0, player.score - drainAmount);
      player.size -= drainAmount * 0.01;
      fx(player.x, player.y, "#00ffff", 1);
    }

    const ptx = (mouse.x - canvas.width / 2) / zoom + player.x;
    const pty = (mouse.y - canvas.height / 2) / zoom + player.y;
    const pdx = ptx - player.x;
    const pdy = pty - player.y;
    const pd = Math.hypot(pdx, pdy);

    if (pd > 5) {
      player.x += (pdx / pd) * pSpeed;
      player.y += (pdy / pd) * pSpeed;
    }

    player.x = Math.max(0, Math.min(world.w, player.x));
    player.y = Math.max(0, Math.min(world.h, player.y));

    player.level = Math.floor(player.score / 1000) + 1;
    if (player.score > 150000) player.score = 150000;
  }
  // ────────────────────────────────────────────────────────────────

  bots.forEach(b => updateAI(b));

  // ─── COLLECT CHEESE ──────────────────────────────────────────────
  for (let i = cheese.length - 1; i >= 0; i--) {
    const c = cheese[i];
    const collectors = playerAlive ? [player, ...bots] : bots;
    for (const r of collectors) {
      if (r.hearts <= 0) continue;
      if (getDist(r, c) < r.size) {
        const val = r.triple > 0 ? c.value * 3 : c.value;
        r.score += val;
        r.size += 0.35;
        if (r.id === "player") {
          floatingTexts.push({
            x: c.x,
            y: c.y,
            text: `+${Math.floor(val)}`,
            color: "#ffff00",
            life: 25
          });
          playPickupSound();
        }
        cheese.splice(i, 1);
        break;
      }
    }
  }

  // ─── COLLECT POWERUPS ────────────────────────────────────────────
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    const collectors = playerAlive ? [player, ...bots] : bots;
    for (const r of collectors) {
      if (r.hearts <= 0) continue;
      if (getDist(r, p) < r.size + 20) {
        if (p.type === "speed")      r.speedBoost = 300;
        else if (p.type === "triple")  r.triple    = 600;
        else if (p.type === "poison")  r.poison    = 480;
        else if (p.type === "extralife") {
          r.hearts = Math.min(MAX_HEARTS, r.hearts + 1);
        }

        if (r.id === "player") {
          floatingTexts.push({
            x: r.x,
            y: r.y,
            text: p.type.toUpperCase() + "!",
            color: "#00ff00",
            life: 40
          });
          playPickupSound();
        }

        powerups.splice(i, 1);
        break;
      }
    }
  }

  // ─── COMBAT ──────────────────────────────────────────────────────
  let fighters = bots.filter(b => b.hearts > 0);
  if (playerAlive) fighters.push(player);

  for (let i = 0; i < fighters.length; i++) {
    for (let j = i + 1; j < fighters.length; j++) {
      handleCombat(fighters[i], fighters[j]);
    }
  }

  draw(playerAlive);
  requestAnimationFrame(loop);
}

function draw(isAlive) {
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();

  if (shake > 0) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    shake *= 0.85;
  }

  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-player.x, -player.y);

  // Grid
  ctx.strokeStyle = "#111";
  ctx.lineWidth = 2;
  for (let i = 0; i < world.w; i += 400) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, world.h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(world.w, i); ctx.stroke();
  }

  // Border
  ctx.strokeStyle = "#ff0080";
  ctx.lineWidth = 30;
  ctx.strokeRect(-15, -15, world.w + 30, world.h + 30);

  cheese.forEach(c => ctx.drawImage(cheeseImg, c.x - 20, c.y - 20, 40, 40));

  powerups.forEach(p => {
    const img = p.type === "speed" ? speedImg :
                p.type === "triple" ? tripleImg :
                p.type === "poison" ? poisonImg : extralifeImg;
    const sz = 60;

    if (p.type === "poison") {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Date.now() * 0.008);
      ctx.drawImage(img, -sz / 2, -sz / 2, sz, sz);
      ctx.restore();
    } else {
      ctx.drawImage(img, p.x - sz / 2, p.y - sz / 2, sz, sz);
    }
  });

  particles.forEach((p, i) => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 40;
    ctx.fillRect(p.x, p.y, 4, 4);
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  });
  ctx.globalAlpha = 1;

  // Draw bots
  bots.forEach(r => {
    if (r.hearts <= 0) return;
    ctx.save();
    if (r.invuln > 0 && Math.floor(Date.now() / 50) % 2 === 0) ctx.globalAlpha = 0.3;
    if (r.flash > 0) {
      ctx.shadowBlur = 30;
      ctx.shadowColor = "#fff";
    } else {
      ctx.shadowBlur = 15;
      ctx.shadowColor = "#ff0080";
    }
    ctx.drawImage(r.skin.img, r.x - r.size, r.y - r.size, r.size * 2, r.size * 2);

    if (r.poison > 0) {
      ctx.save();
      ctx.translate(r.x, r.y);
      ctx.rotate(Date.now() * 0.02);
      ctx.globalAlpha = 0.7;
      ctx.drawImage(poisonImg, -r.size * 1.2, -r.size * 1.2, r.size * 2.4, r.size * 2.4);
      ctx.restore();
    }

    ctx.fillStyle = "white";
    ctx.font = "bold 14px Orbitron";
    ctx.textAlign = "center";
    ctx.fillText(r.name, r.x, r.y - r.size - 25);

    for (let i = 0; i < r.hearts; i++) {
      ctx.drawImage(heartImg, r.x - 22 + i * 25, r.y - r.size - 20, 20, 20);
    }
    ctx.restore();
  });

  // Draw player only if alive
  if (isAlive) {
    ctx.save();
    if (player.invuln > 0 && Math.floor(Date.now() / 50) % 2 === 0) ctx.globalAlpha = 0.3;
    if (player.flash > 0) {
      ctx.shadowBlur = 30;
      ctx.shadowColor = "#fff";
    } else {
      ctx.shadowBlur = 15;
      ctx.shadowColor = "#00ffff";
    }
    ctx.drawImage(player.skin.img, player.x - player.size, player.y - player.size, player.size * 2, player.size * 2);

    if (player.poison > 0) {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(Date.now() * 0.02);
      ctx.globalAlpha = 0.7;
      ctx.drawImage(poisonImg, -player.size * 1.2, -player.size * 1.2, player.size * 2.4, player.size * 2.4);
      ctx.restore();
    }

    ctx.fillStyle = "white";
    ctx.font = "bold 14px Orbitron";
    ctx.textAlign = "center";
    ctx.fillText(player.name, player.x, player.y - player.size - 25);

    for (let i = 0; i < player.hearts; i++) {
      ctx.drawImage(heartImg, player.x - 22 + i * 25, player.y - player.size - 20, 20, 20);
    }
    ctx.restore();
  }

  floatingTexts.forEach((t, i) => {
    ctx.fillStyle = t.color;
    ctx.font = "bold 22px Orbitron";
    ctx.fillText(t.text, t.x, t.y -= 1.8);
    if (--t.life <= 0) floatingTexts.splice(i, 1);
  });

  ctx.restore();

  // ─── UI ──────────────────────────────────────────────────────────
  ctx.fillStyle = "#fff";
  ctx.font = "16px 'Press Start 2P'";
  ctx.fillText(`SCORE: ${Math.floor(player.score)} / 150000`, 20, 40);
  ctx.fillText(`LVL: ${player.level}`, 20, 75);

  let uiOffset = 110;
  if (player.triple > 0) {
    ctx.fillStyle = "#ff00ff";
    ctx.fillText(`TRIPLE: ${Math.ceil(player.triple / 60)}s`, 20, uiOffset);
    uiOffset += 35;
  }
  if (player.speedBoost > 0) {
    ctx.fillStyle = "#00ffff";
    ctx.fillText(`SPEED: ${Math.ceil(player.speedBoost / 60)}s`, 20, uiOffset);
    uiOffset += 35;
  }
  if (player.poison > 0) {
    ctx.fillStyle = "#88ff00";
    ctx.fillText(`POISON: ${Math.ceil(player.poison / 60)}s`, 20, uiOffset);
  }

  drawMinimap();
  updateLeaderboard();
}

function drawMinimap() {
  mCtx.fillStyle = "rgba(0,0,0,0.9)";
  mCtx.fillRect(0, 0, 160, 160);

  const s = 160 / Math.max(world.w, world.h);
  mCtx.fillStyle = "#00ffff";
  mCtx.fillRect(player.x * s - 3, player.y * s - 3, 6, 6);

  mCtx.fillStyle = "#ff0080";
  bots.forEach(b => {
    mCtx.fillRect(b.x * s - 2, b.y * s - 2, 4, 4);
  });
}

function updateLeaderboard() {
  const allPlayers = [{ name: player.name, score: player.score }, ...bots]
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);

  let html = "";
  allPlayers.forEach((r, i) => {
    html += `<div class="rank-row">${i + 1}. ${r.name.substring(0, 10)}: ${Math.floor(r.score)}</div>`;
  });

  document.getElementById("leaderboard").innerHTML = "TOP RATS<br>" + html;

  if (!started) {
    document.getElementById("topFiveMenu").innerHTML = html;
  }
}

// ─── TIMERS ────────────────────────────────────────────────────────
setInterval(() => {
  if (started && cheese.length < 1500) {
    for (let i = 0; i < 8; i++) spawnCheese();
  }
}, 150);

setInterval(() => {
  if (started && powerups.length < 35) {
    const types = ["speed", "triple", "poison", "extralife"];
    const t = types[Math.floor(Math.random() * types.length)];
    powerups.push({
      x: Math.random() * world.w,
      y: Math.random() * world.h,
      type: t
    });
  }
}, 2200);

// ─── INIT ──────────────────────────────────────────────────────────
updateSkinUI();
updateLeaderboard();
</script>
</body>
</html>
