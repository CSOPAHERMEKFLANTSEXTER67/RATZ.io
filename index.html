<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ratz.io - ULTIMATE BATTLE ROYALE EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  /* --- HOTLINE NEON STYLES --- */
  body {
    margin: 0;
    overflow: hidden;
    background: #050505;
    font-family: 'Orbitron', sans-serif;
    color: white;
    user-select: none;
  }
  
  #menu h1 {
    font-size: 80px;
    color: #00ffff;
    text-shadow: 4px 4px 0px #ff0080, -4px -4px 0px #000;
    margin: 10px;
    animation: hotlinePulse 0.5s infinite alternate, hotlineTilt 2s infinite ease-in-out, flicker 2s infinite;
  }

  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 24%, 55% { opacity: 0.5; }
  }
  @keyframes hotlinePulse {
    from { transform: scale(1); filter: hue-rotate(0deg); }
    to { transform: scale(1.05); filter: hue-rotate(30deg); }
  }
  @keyframes hotlineTilt {
    0% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
    100% { transform: rotate(-3deg); }
  }

  #menu, #death, #win {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, rgba(255,0,128,0.2) 0%, rgba(0,0,0,1) 90%);
    z-index: 10;
  }
  #death, #win { display: none; }
  
  #leaderboard {
    position: absolute;
    top: 10px;
    right: 20px;
    width: 240px;
    background: rgba(0, 0, 0, 0.8);
    padding: 15px;
    border: 2px solid #ff0080;
    box-shadow: 0 0 15px #ff0080;
    font-family: 'Press Start 2P';
    font-size: 10px;
  }

  #powerInfo {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-left: 5px solid #00ffff;
  }
  .power { display: flex; align-items: center; margin: 15px; font-size: 11px; }
  .power img { width: 50px; margin-right: 15px; filter: drop-shadow(0 0 5px #00ffff); }

  input, button {
    padding: 15px;
    margin: 10px;
    font-family: 'Press Start 2P';
    font-size: 12px;
    background: #111;
    color: #00ffff;
    border: 3px solid #ff0080;
    cursor: pointer;
  }
  button:hover { background: #ff0080; color: white; box-shadow: 0 0 20px #ff0080; }
  
  #minimap {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 160px;
    height: 160px;
    background: rgba(0, 0, 0, 0.8);
    border: 2px solid #00ffff;
    border-radius: 5px;
  }
  
  #menuBoard { 
    margin-top: 20px; 
    background: rgba(255, 0, 128, 0.1); 
    padding: 10px;
    border: 1px solid #ff0080;
  }
  .rank-row { color: #00ffff; margin: 8px 0; }
</style>
</head>
<body>

<div id="menu">
  <h1>RATZ.IO</h1>
  <div id="powerInfo">
    <div class="power"><img src="meth.png" /> <span>SEEDS = 5s SPEED</span></div>
    <div class="power"><img src="pot.png" /> <span>BERRIES = 10s TRIPLE</span></div>
    <div style="font-size: 10px; color: #ff0080; text-align: center;">ESC = MENU | WHEEL = ZOOM</div>
  </div>
  
  <input id="nameInput" placeholder="ENTER NAME" maxlength="27" />
  
  <div id="skinSelector">
    <button onclick="prevSkin()">◀</button>
    <span id="skinName" style="font-family: 'Press Start 2P'; padding: 0 15px;">Hertz</span>
    <button onclick="nextSkin()">▶</button>
  </div>
  
  <button onclick="start()">ENTER THE MAYHEM</button>
  
  <div id="menuBoard">
    <div style="font-family:'Press Start 2P'; font-size: 10px; color: #ff0080; margin-bottom: 10px;">PRE-GAME TOP 5</div>
    <div id="topFiveMenu"></div>
  </div>
</div>

<div id="death"><h1>💀 YOU GOT ANNIHILATED💀</h1><button onclick="location.reload()">RETRY</button></div>
<div id="win"><h1>🔥 RAT SUPREMACY 🔥</h1><button onclick="location.reload()">AGAIN</button></div>

<div id="leaderboard"></div>
<canvas id="minimap"></canvas>
<canvas id="c"></canvas>

<script>
  /* --- INITIALIZATION & GLOBALS --- */
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const mCanvas = document.getElementById("minimap");
  const mCtx = mCanvas.getContext("2d");
  
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  mCanvas.width = 160;
  mCanvas.height = 160;

  const world = { w: 8000, h: 8000 };
  let zoom = 1.0;
  let started = false;
  let shake = 0;

  // ASSETS
  const cheeseImg = new Image(); cheeseImg.src = "chez1.png";
  const heartImg = new Image(); heartImg.src = "helt.png";
  const speedImg = new Image(); speedImg.src = "meth.png";
  const tripleImg = new Image(); tripleImg.src = "pot.png";

  const ratSkins = [
    { img: new Image(), name: "Hertz" }, { img: new Image(), name: "Bob" },
    { img: new Image(), name: "Gustav" }, { img: new Image(), name: "Daniels" }, 
    { img: new Image(), name: "Robert" }, { img: new Image(), name: "Gobligoo" },
    { img: new Image(), name: "Freakwave" }, { img: new Image(), name: "Blimpy" }
  ];
  ratSkins[0].img.src = "ret1.png"; ratSkins[1].img.src = "ret2.png";
  ratSkins[2].img.src = "ret3.png"; ratSkins[3].img.src = "ret4.png"; 
  ratSkins[4].img.src = "ret5.png"; ratSkins[5].img.src = "ret6.png";
  ratSkins[6].img.src = "ret7.png"; ratSkins[7].img.src = "ret8.png";

  let selectedSkin = 0;
  function updateSkinUI() { document.getElementById("skinName").innerText = ratSkins[selectedSkin].name; }
  function nextSkin() { selectedSkin = (selectedSkin + 1) % ratSkins.length; updateSkinUI(); }
  function prevSkin() { selectedSkin = (selectedSkin - 1 + ratSkins.length) % ratSkins.length; updateSkinUI(); }

  const music = new Audio("Neon Bloodbath.mp3");
  music.loop = true; music.volume = 0.3;

  let cheese = [];
  let powerups = [];
  let bots = [];
  let particles = [];
  let floatingTexts = [];

  let player = {
    id: "player",
    x: world.w/2, y: world.h/2,
    size: 45, score: 0, hearts: 2, name: "RAT",
    speedBoost: 0, triple: 0, speedMul: 1, skin: ratSkins[0], level: 1,
    invuln: 0, flash: 0
  };

  let mouse = { x: 0, y: 0 };
  let boosting = false;

  window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
  window.onmousedown = () => { boosting = true; };
  window.onmouseup = () => { boosting = false; };
  window.onwheel = e => {
    if (e.deltaY > 0) zoom = Math.max(0.3, zoom - 0.05);
    else zoom = Math.min(1.8, zoom + 0.05);
  };
  window.onkeydown = e => { if(e.key === "Escape") location.reload(); };
  window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };

  function getDist(o1, o2) { return Math.hypot(o1.x - o2.x, o1.y - o2.y); }
  
  function spawnCheese(x, y, value = 30) {
    cheese.push({ 
        x: x || Math.random() * world.w, 
        y: y || Math.random() * world.h, 
        size: 15, value: value 
    });
  }

  function spawnBot() {
    const botNames = [
      "Ben Dover", "Phil McCracken", "Anita Bath", "Hugh Jass", "Al Beback", 
      "Seymour Butts", "Drew Peacock", "Lou Natic", "Ivana Tinkle", 
      "Oliver Klozoff", "Barry McCockiner", "Holden McGroin", "Willie Stroker"
    ];
    bots.push({
      id: "bot_" + Math.random(),
      x: Math.random() * world.w, y: Math.random() * world.h,
      tx: Math.random() * world.w, ty: Math.random() * world.h, 
      size: 35 + Math.random()*25, speed: 2.2 + Math.random(), score: 200 + Math.random()*300, hearts: 2,
      name: botNames[Math.floor(Math.random()*botNames.length)],
      skin: ratSkins[Math.floor(Math.random()*ratSkins.length)],
      invuln: 0, flash: 0,
      state: "WANDER" 
    });
  }

  function dropLoot(target) {
    let dropAmount = Math.floor(target.score * 0.5);
    let chunks = 12;
    let valPer = Math.max(10, dropAmount / chunks);
    for(let i=0; i<chunks; i++) {
        spawnCheese(target.x + (Math.random()-0.5)*200, target.y + (Math.random()-0.5)*200, valPer);
    }
    fx(target.x, target.y, "#ff0080", 15);
  }

  function fx(x, y, color, count=5) {
    for(let i=0; i<count; i++) {
      particles.push({
        x, y, dx: (Math.random()-0.5)*8, dy: (Math.random()-0.5)*8, 
        life: 20 + Math.random()*20, color
      });
    }
  }

  function start() {
    player.name = document.getElementById("nameInput").value || "RAT";
    player.skin = ratSkins[selectedSkin];
    
    // CHEAT CODES
    if (player.name === "forksinthesockets") player.speedMul = 2.0;
    if (player.name === "ihave200rats") player.hearts = 5;

    document.getElementById("menu").style.display = "none";
    started = true;
    for(let i=0; i<35; i++) spawnBot();
    music.play().catch(() => {});
    loop();
  }

  function updateAI(bot) {
    if (bot.invuln > 0) bot.invuln--;
    if (bot.flash > 0) bot.flash--;

    let nearestThreat = null;
    let nearestPrey = null;
    let threatDist = 500;
    let preyDist = 600;

    let potentialTargets = [player, ...bots.filter(b => b.id !== bot.id)];
    
    potentialTargets.forEach(t => {
      let d = getDist(bot, t);
      if (t.size > bot.size * 1.15 && d < threatDist) { nearestThreat = t; threatDist = d; }
      else if (t.size < bot.size * 0.85 && d < preyDist) { nearestPrey = t; preyDist = d; }
    });

    if (nearestThreat) {
        bot.state = "FLEE";
        let angle = Math.atan2(bot.y - nearestThreat.y, bot.x - nearestThreat.x);
        bot.tx = bot.x + Math.cos(angle) * 400;
        bot.ty = bot.y + Math.sin(angle) * 400;
    } else if (nearestPrey) {
        bot.state = "HUNT";
        bot.tx = nearestPrey.x; bot.ty = nearestPrey.y;
    } else {
        bot.state = "EAT";
        let closestC = null;
        let cDist = 800;
        cheese.slice(0, 50).forEach(c => {
            let d = getDist(bot, c);
            if (d < cDist) { cDist = d; closestC = c; }
        });
        if (closestC) { bot.tx = closestC.x; bot.ty = closestC.y; } 
        else if (getDist(bot, {x: bot.tx, y: bot.ty}) < 50) {
            bot.tx = Math.random() * world.w; bot.ty = Math.random() * world.h;
        }
    }

    let angle = Math.atan2(bot.ty - bot.y, bot.tx - bot.x);
    let spd = bot.speed * (bot.state === "FLEE" ? 1.6 : 1);
    bot.x += Math.cos(angle) * spd;
    bot.y += Math.sin(angle) * spd;
    bot.x = Math.max(50, Math.min(world.w-50, bot.x));
    bot.y = Math.max(50, Math.min(world.h-50, bot.y));
  }

  function handleCombat(r1, r2) {
    if (r1.invuln > 0 || r2.invuln > 0) return;
    let dist = getDist(r1, r2);
    if (dist < r1.size + r2.size) {
        let winner = r1.size > r2.size ? r1 : r2;
        let loser = r1.size > r2.size ? r2 : r1;
        loser.hearts--;
        loser.invuln = 60;
        loser.flash = 10;
        shake = 8; 

        let angle = Math.atan2(loser.y - winner.y, loser.x - winner.x);
        loser.x += Math.cos(angle) * 200;
        loser.y += Math.sin(angle) * 200;

        if (loser.hearts <= 0) {
            winner.score += 500;
            winner.size += 6;
            dropLoot(loser);
            if (winner.id === "player") {
                floatingTexts.push({x: winner.x, y: winner.y, text: "RAT DEFEATED +500", color: "#00ffff", life: 50});
            }
            if (loser.id === "player") document.getElementById("death").style.display = "flex";
            else { bots = bots.filter(b => b.id !== loser.id); spawnBot(); }
        }
    }
  }

  function loop() {
    if (!started) return;

    // 1. Player Timers
    if (player.speedBoost > 0) player.speedBoost--;
    if (player.triple > 0) player.triple--; 
    if (player.invuln > 0) player.invuln--;
    if (player.flash > 0) player.flash--;

    // 2. Player Movement & DYNAMIC DRAIN
    let pSpeed = (boosting ? 6.0 : 3.2) * player.speedMul;
    if (player.speedBoost > 0) { pSpeed += 3.5; }

    if (boosting && player.score > 10) {
        let drainAmount = 0.5 + (player.level * 0.45);
        player.score -= drainAmount; 
        player.size -= (drainAmount * 0.01);
        fx(player.x, player.y, "#00ffff", 1);
    }

    let ptx = (mouse.x - canvas.width/2)/zoom + player.x;
    let pty = (mouse.y - canvas.height/2)/zoom + player.y;
    let pdx = ptx - player.x, pdy = pty - player.y;
    let pd = Math.hypot(pdx, pdy);
    
    if (pd > 5) {
      player.x += (pdx/pd) * pSpeed;
      player.y += (pdy/pd) * pSpeed;
    }
    player.x = Math.max(0, Math.min(world.w, player.x));
    player.y = Math.max(0, Math.min(world.h, player.y));
    player.level = Math.floor(player.score / 1000) + 1;

    bots.forEach(b => updateAI(b));

    // 3. Collection
    for(let i=cheese.length-1; i>=0; i--) {
        let c = cheese[i];
        let rats = [player, ...bots];
        for(let r of rats) {
            if(getDist(r, c) < r.size) {
                let val = (r.id === "player" && r.triple > 0) ? c.value * 3 : c.value;
                r.score += val; r.size += 0.35;
                if(r.id === "player") floatingTexts.push({x: c.x, y: c.y, text: `+${Math.floor(val)}`, color: "#ffff00", life: 25});
                cheese.splice(i, 1);
                break;
            }
        }
    }

    // 4. Combat
    let all = [player, ...bots];
    for (let i = 0; i < all.length; i++) {
        for (let j = i + 1; j < all.length; j++) {
            handleCombat(all[i], all[j]);
        }
    }

    // 5. Powerups (Triple = 10s, Speed = 5s)
    for(let i=powerups.length-1; i>=0; i--) {
        let p = powerups[i];
        if(getDist(player, p) < player.size + 20) {
            if(p.type === "speed") player.speedBoost = 300; 
            else player.triple = 600; 
            powerups.splice(i, 1);
            floatingTexts.push({x: player.x, y: player.y, text: p.type.toUpperCase() + "!", color: "#00ff00", life: 40});
        }
    }

    draw();
    requestAnimationFrame(loop);
  }

  function draw() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0,0, canvas.width, canvas.height);
    ctx.save();
    
    if(shake > 0) {
        ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
        shake *= 0.85;
    }
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(zoom, zoom);
    ctx.translate(-player.x, -player.y);

    // World Floor
    ctx.strokeStyle = "#111"; ctx.lineWidth = 2;
    for(let i=0; i<world.w; i+=400) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, world.h); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(world.w, i); ctx.stroke();
    }
    ctx.strokeStyle = "#ff0080"; ctx.lineWidth = 30;
    ctx.strokeRect(-15, -15, world.w+30, world.h+30);

    cheese.forEach(c => ctx.drawImage(cheeseImg, c.x-20, c.y-20, 40, 40));
    powerups.forEach(p => ctx.drawImage(p.type === "speed" ? speedImg : tripleImg, p.x-30, p.y-30, 60, 60));
    
    particles.forEach((p, i) => {
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 40;
        ctx.fillRect(p.x, p.y, 4, 4);
        p.x += p.dx; p.y += p.dy; p.life--;
        if(p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;

    [player, ...bots].forEach(r => {
        ctx.save();
        if (r.invuln > 0 && Math.floor(Date.now()/50)%2) ctx.globalAlpha = 0.3;
        if (r.flash > 0) { ctx.shadowBlur = 30; ctx.shadowColor = "#fff"; }
        else { ctx.shadowBlur = 15; ctx.shadowColor = r.id === "player" ? "#00ffff" : "#ff0080"; }
        ctx.drawImage(r.skin.img, r.x-r.size, r.y-r.size, r.size*2, r.size*2);
        ctx.fillStyle = "white"; ctx.font = "bold 14px Orbitron"; ctx.textAlign = "center";
        ctx.fillText(r.name, r.x, r.y - r.size - 25);
        for(let i=0; i<r.hearts; i++) ctx.drawImage(heartImg, r.x - 22 + (i*25), r.y - r.size - 20, 20, 20);
        ctx.restore();
    });

    floatingTexts.forEach((t, i) => {
        ctx.fillStyle = t.color; ctx.font = "bold 22px Orbitron";
        ctx.fillText(t.text, t.x, t.y -= 1.8);
        if(t.life-- <= 0) floatingTexts.splice(i, 1);
    });
    ctx.restore();

    // DYNAMIC UI 
    ctx.fillStyle = "#fff"; ctx.font = "16px 'Press Start 2P'";
    ctx.fillText(`SCORE: ${Math.floor(player.score)}`, 20, 40);
    ctx.fillText(`LVL: ${player.level}`, 20, 75);
    
    let uiOffset = 110;
    if (player.triple > 0) {
        ctx.fillStyle = "#ff00ff";
        ctx.fillText(`TRIPLE: ${Math.ceil(player.triple/60)}s`, 20, uiOffset);
        uiOffset += 35;
    }
    if (player.speedBoost > 0) {
        ctx.fillStyle = "#00ffff";
        ctx.fillText(`SPEED: ${Math.ceil(player.speedBoost/60)}s`, 20, uiOffset);
    }

    drawMinimap();
    updateLeaderboard();
  }

  function drawMinimap() {
    mCtx.fillStyle = "rgba(0,0,0,0.9)"; mCtx.fillRect(0,0,160,160);
    let s = 160/world.w;
    mCtx.fillStyle = "#00ffff"; mCtx.fillRect(player.x*s-3, player.y*s-3, 6, 6);
    mCtx.fillStyle = "#ff0080"; bots.forEach(b => mCtx.fillRect(b.x*s-2, b.y*s-2, 4, 4));
  }

  function updateLeaderboard() {
    let allPlayers = [{name: player.name, score: player.score}, ...bots].sort((a,b)=>b.score-a.score).slice(0,5);
    let html = "";
    allPlayers.forEach((r, i) => {
        html += `<div class="rank-row">${i+1}. ${r.name.substring(0,10)}: ${Math.floor(r.score)}</div>`;
    });
    document.getElementById("leaderboard").innerHTML = "TOP RATS<br>" + html;
    if(!started) document.getElementById("topFiveMenu").innerHTML = html;
  }

  setInterval(() => { if(started && cheese.length < 1500) for(let i=0; i<8; i++) spawnCheese(); }, 150);
  setInterval(() => { if(started && powerups.length < 15) powerups.push({x:Math.random()*world.w, y:Math.random()*world.h, type:Math.random()<0.5?"speed":"triple"}); }, 5000);

  updateSkinUI();
  for(let i=0; i<5; i++) bots.push({name: "Bot "+i, score: 500 + Math.random()*800});
  updateLeaderboard();
  bots = []; 
</script>
</body>
</html>
